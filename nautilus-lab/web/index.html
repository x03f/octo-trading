<!doctype html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nautilus Trading Lab</title>
<style>
:root{--bg:#0b0e14;--panel:#131722;--panel2:#1a1f2e;--line:#232838;--ink:#e6e9ef;--ink2:#8b93a7;
--good:#26a69a;--bad:#ef5350;--warn:#f0a020;--accent:#4c8dff;--chip:#1e2433}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
header{display:flex;align-items:center;gap:14px;padding:14px 22px;border-bottom:1px solid var(--line);background:var(--panel)}
header h1{font-size:16px;margin:0;font-weight:650;letter-spacing:.2px}
header .badge{font-size:11px;padding:3px 8px;border-radius:5px;background:var(--chip);color:var(--ink2)}
header .live{display:inline-flex;align-items:center;gap:5px}
header .live i{width:7px;height:7px;border-radius:50%;background:var(--bad);display:inline-block}
header .live.on i{background:var(--good);box-shadow:0 0 6px var(--good)}
nav{display:flex;gap:2px;padding:0 16px;border-bottom:1px solid var(--line);background:var(--panel);overflow-x:auto}
nav button{background:none;border:none;color:var(--ink2);padding:11px 14px;cursor:pointer;font-size:13px;border-bottom:2px solid transparent;white-space:nowrap}
nav button.on{color:var(--ink);border-bottom-color:var(--accent)}
main{padding:20px 22px;max-width:1440px}
.grid{display:grid;gap:14px}
.g4{grid-template-columns:repeat(4,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:repeat(2,1fr)}
@media(max-width:900px){.g4,.g3,.g2{grid-template-columns:1fr 1fr}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px}
.card h2{font-size:13px;margin:0 0 12px;color:var(--ink2);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.stat .v{font-size:26px;font-weight:680;letter-spacing:-.5px}
.stat .l{font-size:12px;color:var(--ink2);margin-top:2px}
.pos{color:var(--good)}.neg{color:var(--bad)}.mut{color:var(--ink2)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--ink2);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--line);font-size:11px;text-transform:uppercase}
td{padding:9px 10px;border-bottom:1px solid var(--panel2)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
tr.clk{cursor:pointer}tr.clk:hover{background:var(--panel2)}
.tag{font-size:11px;padding:2px 7px;border-radius:4px;font-weight:600}
.tag.candidate{background:rgba(38,166,154,.15);color:var(--good)}
.tag.buried{background:rgba(239,83,80,.12);color:var(--bad)}
.tag.research{background:rgba(76,141,255,.15);color:var(--accent)}
.tag.paper{background:rgba(240,160,32,.15);color:var(--warn)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.dot.on{background:var(--good)}.dot.off{background:var(--bad)}.dot.na{background:var(--ink2)}
.muted{color:var(--ink2);font-size:12px}
.hidden{display:none}
.pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;background:var(--chip);color:var(--ink2);margin-right:6px;margin-bottom:4px}
.note{font-size:12px;color:var(--ink2);line-height:1.5;margin:6px 0 0}
.bar{height:6px;background:var(--panel2);border-radius:3px;overflow:hidden;margin-top:6px}
.bar>i{display:block;height:100%;background:var(--good)}
button.act{background:var(--chip);border:1px solid var(--line);color:var(--ink);padding:5px 11px;border-radius:6px;cursor:pointer;font-size:12px;margin:2px}
button.act:hover{border-color:var(--accent)}
button.danger{border-color:var(--bad);color:var(--bad)}
input,select{background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:5px 8px;border-radius:6px;font-size:12px;margin:2px}
.stage{display:flex;gap:0;margin:8px 0}
.stage>div{flex:1;text-align:center;padding:6px 4px;font-size:11px;border:1px solid var(--line);color:var(--ink2)}
.stage>div.act{background:rgba(76,141,255,.15);color:var(--ink);border-color:var(--accent)}
.stage>div:first-child{border-radius:6px 0 0 6px}.stage>div:last-child{border-radius:0 6px 6px 0}
.kv{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--panel2);font-size:12px}
.kv b{font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<header>
  <h1>⚓ Nautilus Trading Lab</h1>
  <span class="badge" id="hdr-engine">NautilusTrader —</span>
  <span class="badge" id="hdr-mode">режим —</span>
  <span class="badge live" id="hdr-live" style="margin-left:auto"><i></i>live-поток</span>
  <span class="badge" id="hdr-uptime"></span>
</header>
<nav id="nav"></nav>
<main id="view"></main>

<script>
const TABS=[["overview","Overview"],["research","Research Lab"],["backtest","Backtest Explorer"],
  ["strategies","Strategies"],["portfolios","Paper Portfolios"],["live","Live Trading"],
  ["adaptive","Adaptive AI"],["datalake","Data Lake"],["system","System"]];
let CUR="overview",SSE=null,LIVE={};
const $=s=>document.querySelector(s);
const pct=x=>x==null?"—":(x>=0?"+":"")+(+x).toFixed(2)+"%";
const cls=x=>x==null?"mut":x>=0?"pos":"neg";
const sh=x=>x==null?"—":(x>=0?"+":"")+(+x).toFixed(2);
const money=x=>x==null?"—":"$"+(+x).toLocaleString(undefined,{maximumFractionDigits:0});
async function get(p){try{const r=await fetch(p,{cache:"no-store"});return await r.json()}catch(e){return null}}
async function post(p,body){try{const r=await fetch(p,{method:"POST",headers:{"Content-Type":"application/json"},body:body?JSON.stringify(body):null});return await r.json()}catch(e){return{error:String(e)}}}
function toast(m){let t=document.createElement("div");t.textContent=m;t.style.cssText="position:fixed;bottom:20px;right:20px;background:var(--panel2);border:1px solid var(--accent);color:var(--ink);padding:10px 16px;border-radius:8px;z-index:99;font-size:13px";document.body.appendChild(t);setTimeout(()=>t.remove(),4000)}
function nav(){$("#nav").innerHTML=TABS.map(([k,t])=>`<button class="${k==CUR?'on':''}" onclick="go('${k}')">${t}</button>`).join("")}
function go(k){CUR=k;nav();render()}
function tile(v,l,c){return `<div class="card stat"><div class="v ${c||''}">${v}</div><div class="l">${l}</div></div>`}

/* ---------- SVG чарт-примитивы (без внешних либ) ---------- */
const PALETTE=["#4c8dff","#26a69a","#f0a020","#ef5350","#ab7df8","#42a5f5","#66bb6a","#ec407a"];
function chartLines(series,opts={}){
  const W=opts.w||820,H=opts.h||240,pl=46,pr=12,pt=14,pb=22;
  const all=series.flatMap(s=>s.data).filter(x=>x!=null&&isFinite(x));
  if(!all.length)return '<p class="muted">нет данных</p>';
  let lo=opts.min!=null?opts.min:Math.min(...all),hi=opts.max!=null?opts.max:Math.max(...all);
  if(opts.log){lo=Math.log(Math.max(lo,1e-6));hi=Math.log(Math.max(hi,1e-6))}
  if(hi<=lo)hi=lo+1;
  const n=Math.max(...series.map(s=>s.data.length));
  const X=i=>pl+(W-pl-pr)*(n<2?0:i/(n-1));
  const tv=v=>opts.log?Math.log(Math.max(v,1e-6)):v;
  const Y=v=>pt+(H-pt-pb)*(1-(tv(v)-lo)/(hi-lo));
  const path=s=>s.data.map((v,i)=>(v==null||!isFinite(v))?null:`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).filter(Boolean).join(" ");
  let grid="",labs="";
  for(let k=0;k<=4;k++){const yy=pt+(H-pt-pb)*k/4;const val=opts.log?Math.exp(hi-(hi-lo)*k/4):hi-(hi-lo)*k/4;
    grid+=`<line x1="${pl}" y1="${yy}" x2="${W-pr}" y2="${yy}" stroke="#232838"/>`;
    labs+=`<text x="${pl-6}" y="${yy+3}" text-anchor="end" font-size="10" fill="#8b93a7">${opts.fmt?opts.fmt(val):val.toFixed(2)}</text>`}
  let zero="";if(!opts.log&&lo<0&&hi>0){const y0=Y(0);zero=`<line x1="${pl}" y1="${y0}" x2="${W-pr}" y2="${y0}" stroke="#4a5570" stroke-dasharray="3 3"/>`}
  const polys=series.map(s=>`<polyline fill="none" stroke="${s.color}" stroke-width="1.7" points="${path(s)}"/>`).join("");
  let xl="";const xs=opts.x||[];
  if(xs.length){[0,Math.floor(xs.length/2),xs.length-1].forEach(i=>{xl+=`<text x="${X(i*(n-1)/(xs.length-1))}" y="${H-6}" text-anchor="middle" font-size="10" fill="#8b93a7">${xs[i]}</text>`})}
  const leg=series.filter(s=>s.name).map(s=>`<span class="pill" style="color:${s.color}">■ ${s.name}</span>`).join("");
  return `<div style="overflow-x:auto">${leg?`<div style="margin-bottom:6px">${leg}</div>`:""}<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:${W}px">${grid}${zero}${polys}${labs}${xl}</svg></div>`;
}
function heatColor(v,max){/* diverging красный-зелёный, 0=нейтраль */
  const t=Math.max(-1,Math.min(1,v/(max||1)));
  if(t>=0)return `rgba(38,166,154,${0.15+0.7*t})`;
  return `rgba(239,83,80,${0.15+0.7*(-t)})`;
}
function chartHeatmap(rows,cols,matrix,opts={}){
  const cw=opts.cw||44,ch=opts.ch||26,lw=opts.lw||60,th=18;
  const max=opts.max||Math.max(0.0001,...matrix.flat().filter(x=>x!=null&&isFinite(x)).map(Math.abs));
  const W=lw+cols.length*cw,H=th+rows.length*ch;
  let out="";
  cols.forEach((c,j)=>out+=`<text x="${lw+j*cw+cw/2}" y="${th-5}" text-anchor="middle" font-size="10" fill="#8b93a7">${c}</text>`);
  rows.forEach((r,i)=>{
    out+=`<text x="${lw-6}" y="${th+i*ch+ch/2+3}" text-anchor="end" font-size="10" fill="#8b93a7">${r}</text>`;
    cols.forEach((c,j)=>{const v=matrix[i][j];
      const fill=v==null||!isFinite(v)?"#1a1f2e":heatColor(v,max);
      const txt=v==null||!isFinite(v)?"":(opts.fmt?opts.fmt(v):v.toFixed(0));
      out+=`<rect x="${lw+j*cw}" y="${th+i*ch}" width="${cw-2}" height="${ch-2}" rx="2" fill="${fill}"/>`+
           `<text x="${lw+j*cw+cw/2-1}" y="${th+i*ch+ch/2+3}" text-anchor="middle" font-size="9" fill="#e6e9ef">${txt}</text>`})});
  return `<div style="overflow-x:auto"><svg viewBox="0 0 ${W} ${H}" width="${W}" style="max-width:100%">${out}</svg></div>`;
}
function chartCI(items,opts={}){/* доверительные интервалы: [{name,low,high,point,color}] горизонтально */
  const W=opts.w||760,rowH=30,pl=120,pr=40,pt=8;const H=pt+items.length*rowH+16;
  const all=items.flatMap(i=>[i.low,i.high,i.point,0]).filter(x=>x!=null&&isFinite(x));
  let lo=Math.min(...all),hi=Math.max(...all);if(hi<=lo)hi=lo+1;const pad=(hi-lo)*0.08;lo-=pad;hi+=pad;
  const X=v=>pl+(W-pl-pr)*(v-lo)/(hi-lo);
  let out=`<line x1="${X(0)}" y1="${pt}" x2="${X(0)}" y2="${pt+items.length*rowH}" stroke="#4a5570" stroke-dasharray="3 3"/>`;
  out+=`<text x="${X(0)}" y="${H-2}" text-anchor="middle" font-size="9" fill="#8b93a7">0</text>`;
  items.forEach((it,i)=>{const y=pt+i*rowH+rowH/2;const col=it.color||"#4c8dff";
    out+=`<text x="4" y="${y+3}" font-size="11" fill="#e6e9ef">${it.name}</text>`;
    out+=`<line x1="${X(it.low)}" y1="${y}" x2="${X(it.high)}" y2="${y}" stroke="${col}" stroke-width="3" opacity="0.5"/>`;
    out+=`<line x1="${X(it.low)}" y1="${y-4}" x2="${X(it.low)}" y2="${y+4}" stroke="${col}"/>`;
    out+=`<line x1="${X(it.high)}" y1="${y-4}" x2="${X(it.high)}" y2="${y+4}" stroke="${col}"/>`;
    if(it.point!=null)out+=`<circle cx="${X(it.point)}" cy="${y}" r="4" fill="${col}"/>`;
    out+=`<text x="${W-pr+4}" y="${y+3}" font-size="10" fill="#8b93a7">${it.low.toFixed(1)}..${it.high.toFixed(1)}</text>`});
  return `<div style="overflow-x:auto"><svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:${W}px">${out}</svg></div>`;
}
function chartBars(items,opts={}){/* горизонтальные бары: [{name,value,color}] */
  if(!items.length)return '<p class="muted">нет данных</p>';
  const max=Math.max(...items.map(i=>Math.abs(i.value)))||1;
  return `<div>${items.map(i=>{const w=Math.abs(i.value)/max*100;const col=i.color||(i.value>=0?"var(--good)":"var(--bad)");
    return `<div style="margin:6px 0"><div style="display:flex;justify-content:space-between;font-size:12px"><span>${i.name}</span><b>${opts.fmt?opts.fmt(i.value):i.value}</b></div>
    <div class="bar"><i style="width:${w}%;background:${col}"></i></div></div>`}).join("")}</div>`;
}
/* месячная доходность из кривой эквити + дат → матрица год×месяц */
function monthlyMatrix(equity,dates){
  if(!equity||!dates||equity.length<2)return null;
  const byMonth={};
  for(let i=0;i<dates.length;i++){const m=(dates[i]||"").slice(0,7);if(!m)continue;
    if(!byMonth[m])byMonth[m]={first:equity[i],last:equity[i]};byMonth[m].last=equity[i]}
  const months=Object.keys(byMonth).sort();
  const years=[...new Set(months.map(m=>m.slice(0,4)))];
  const MN=["01","02","03","04","05","06","07","08","09","10","11","12"];
  const matrix=years.map(y=>MN.map(mn=>{const k=y+"-"+mn;return byMonth[k]?(byMonth[k].last/byMonth[k].first-1)*100:null}));
  return {years,MN:["Я","Ф","М","А","М","И","И","А","С","О","Н","Д"],matrix};
}

/* ---------- boot + SSE ---------- */
async function boot(){
  nav();
  const h=await get("/api/overview")||{};
  $("#hdr-engine").textContent="NautilusTrader "+(h.nautilus?.version||"—");
  $("#hdr-mode").textContent=h.gateio?.keys_ready?"LIVE готов":"paper-only (нет ключей)";
  render();
  startSSE();
}
function startSSE(){
  try{
    SSE=new EventSource("/api/stream");
    SSE.onmessage=e=>{try{LIVE=JSON.parse(e.data);$("#hdr-live").classList.add("on");
      const u=LIVE.overview?.forward;if(u&&$("#live-fwd"))$("#live-fwd").textContent=money(u.total)+" · "+pct(u.pnl_pct);
      if(CUR=="overview"||CUR=="live")render();}catch(_){}};
    SSE.onerror=()=>{$("#hdr-live").classList.remove("on")};
  }catch(_){}
}
async function render(){
  const v=$("#view");
  const R={overview:renderOverview,research:renderResearch,backtest:renderBacktest,strategies:renderStrategies,
    portfolios:renderPortfolios,live:renderLive,adaptive:renderAdaptive,datalake:renderLake,system:renderSystem};
  (R[CUR]||renderOverview)(v);
}

async function renderOverview(v){
  const d=LIVE.overview||await get("/api/overview")||{};
  const f=d.forward||{},s=d.strategies||{},data=d.data||{};
  v.innerHTML=`
  <div class="grid g4">
    ${tile(`<span id="live-fwd">${money(f.total)}</span>`,"Форвард-контур (Nautilus paper)")}
    ${tile(pct(f.pnl_pct),"Форвард P&L",cls(f.pnl_pct))}
    ${tile(((data.candles||0)/1e6).toFixed(1)+"M","Свечей в озере")}
    ${tile(s.candidate||0,"Стратегий-кандидатов","pos")}
  </div>
  <div class="grid g2" style="margin-top:14px">
    <div class="card"><h2>Компоненты</h2><div id="comps"></div></div>
    <div class="card"><h2>Nautilus бэктест по наборам (S4 Donchian, 2 года)</h2>
      <table><thead><tr><th>Набор</th><th class="num">Инстр.</th><th class="num">P&L</th><th class="num">Сделок</th></tr></thead>
      <tbody>${(d.backtests_nautilus||[]).map(x=>`<tr><td>${x.set}</td><td class="num">${x.n_instruments}</td><td class="num ${cls(x.pnl_pct)}">${pct(x.pnl_pct)}</td><td class="num">${x.fills}</td></tr>`).join("")}</tbody></table>
      <p class="note">Все в минусе — устойчивого края у пробойных стратегий нет (честный трёхчастный тест).</p></div>
  </div>
  <div class="card" style="margin-top:14px"><h2>Форвард-контур (Nautilus-native, независим от OctoBot)</h2>
    <div id="fwd-contours"></div>
    <p class="note">Источник: собственный Nautilus/paper-контур (не OctoBot). Стартует заново — историческая кривая OctoBot заархивирована. Обновление live через SSE.</p></div>`;
  const hh=await get("/api/health");
  if(hh)$("#comps").innerHTML=Object.entries(hh.components).map(([k,ok])=>
    `<div style="padding:4px 0"><span class="dot ${ok?'on':(k=='gateio_keys'||k=='llm'?'na':'off')}"></span>${k} <span class="muted">${ok?"ok":(k=='gateio_keys'?"нет ключей":k=='llm'?"не настроен":"нет")}</span></div>`).join("");
  const fwd=await get("/api/forward");
  if(fwd&&$("#fwd-contours"))$("#fwd-contours").innerHTML=(fwd.snapshot?.contours||[]).map(c=>
    `<div class="kv"><span>${c.name} <span class="muted">${c.engine}</span></span><b>${money(c.equity)} / старт ${money(c.start)}</b></div>`).join("")||'<span class="muted">контуры не запущены</span>';
}

async function renderResearch(v){
  const d=await get("/api/experiments")||{};
  const rows=d.leaderboard||[];
  v.innerHTML=`<div class="card"><h2>Research Lab — реестр экспериментов (DuckDB, воспроизводимо)</h2>
    <p class="note">Экспериментов: <b>${d.count||0}</b>. Каждый: git_sha + версия данных + seed · трёхчастный · НАСТОЯЩИЙ walk-forward (ре-оптимизация) · Monte Carlo · trade-метрики · полный артефакт (equity/DD/косты).</p>
    <table><thead><tr><th>Run ID</th><th>Strat</th><th class="num">Ret</th><th class="num">Sharpe</th><th class="num">TEST</th><th class="num">WF-OOS</th><th class="num">MC CI</th><th class="num">Сделок</th><th class="num">PF</th><th>Вердикт</th></tr></thead>
    <tbody>${rows.map(r=>`<tr class="clk" onclick="showExp('${r.run_id}')">
      <td class="muted" style="font-size:11px">${(r.run_id||"").slice(4,24)}</td><td><b>${r.strategy}</b></td>
      <td class="num ${cls(r.total_return*100)}">${pct((r.total_return||0)*100)}</td><td class="num ${cls(r.sharpe)}">${sh(r.sharpe)}</td>
      <td class="num ${cls(r.test_sharpe)}">${sh(r.test_sharpe)}</td><td class="num ${cls(r.wf_sharpe)}">${sh(r.wf_sharpe)}</td>
      <td class="num muted" style="font-size:11px">${r.mc_sharpe_p05!=null?r.mc_sharpe_p05.toFixed(1)+".."+(r.mc_sharpe_p95||0).toFixed(1):"—"}</td>
      <td class="num">${r.n_trades??"—"}</td><td class="num">${r.profit_factor??"—"}</td>
      <td><span class="tag ${r.verdict=='survived_3set'?'candidate':'buried'}">${r.verdict}</span></td></tr>`).join("")||'<tr><td colspan=10 class=muted>нет экспериментов — ntlab experiment &lt;S8|S4|..&gt;</td></tr>'}</tbody></table>
    <p class="note">Клик по строке — детальный артефакт (кривые, walk-forward фолды, Monte Carlo CI). Запуск: <code>ntlab experiment S8</code> / batch: <code>run_experiments_batch.py</code>.</p></div>
    <div id="exp-detail" style="margin-top:14px"></div>`;
  const bar=document.createElement("div");bar.className="card";bar.style.marginBottom="14px";
  bar.innerHTML=`<h2>Создать эксперимент</h2><select id="exp-strat"><option>S8</option><option>S4</option><option>S5</option><option>S1</option><option>S9</option><option>S3</option></select>
    <button class="act" onclick="createExp()">Запустить (backtest+walk-forward+MC)</button>`;
  v.querySelector(".card").before(bar);
}
async function createExp(){const st=document.getElementById("exp-strat").value;toast("Эксперимент "+st+" запущен в фоне…");await post("/api/experiment/create",{strategy:st});setTimeout(()=>{if(CUR=="research")render()},45000)}
async function showExp(rid){
  const d=await get("/api/experiment/"+rid);const box=$("#exp-detail");if(!d||d.error){box.innerHTML='<div class="card muted">артефакт не найден</div>';return}
  const wf=d.walk_forward||{};
  const mci=[{name:d.strategy+" TEST",low:d.mc_sharpe_p05,high:d.mc_sharpe_p95,point:d.test_sharpe,color:"#4c8dff"}];
  const mm=monthlyMatrix(d.equity_curve,null);
  box.innerHTML=`<div class="card"><h2>Артефакт ${d.strategy} · ${(d.run_id||"").slice(4,24)}</h2>
    <div class="grid g4">
      ${tile(money(10000*(1+(d.total_return||0))),"Капитал из $10k",cls(d.total_return))}

      <div class="stage">${STAGES.map(s=>`<div class="${STAGES.indexOf(c.stage)>=STAGES.indexOf(s)?'act':''}">${s}</div>`).join("")}</div></div>`).join("")
